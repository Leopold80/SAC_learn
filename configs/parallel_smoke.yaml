# Short CPU plumbing check for subprocess sampling. Rewards are not research results.

experiment:
  environment: LunarLanderContinuous-v3
  algorithm: SAC
  policy: MlpPolicy
  variants:
    - mlp

environment:
  frame_stack: 1
  n_envs: 2

training:
  timesteps: 256
  seed: 42
  device: auto
  allow_cpu: true
  progress_bar: false

evaluation:
  episodes: 1
  frequency: 128

output:
  directory: outputs/lunarlander_parallel_smoke
  tensorboard_log: runs/lunarlander_parallel_smoke
  run_tag: null

sac:
  learning_rate: 0.00073
  learning_rate_schedule: linear
  policy_net_arch: [64, 64]
  buffer_size: 10000
  batch_size: 64
  ent_coef: auto
  gamma: 0.99
  tau: 0.01
  train_freq: 1
  gradient_steps: 2
  learning_starts: 64

ltc:
  liquid_hidden_dim: 128
  features_dim: 256
  raw_features_dim: 128
  fusion_hidden_dim: 256
  dt: 1.0
  tau_min: 0.1
  ode_unfolds: 4
  reversal_init_scale: 1.0
