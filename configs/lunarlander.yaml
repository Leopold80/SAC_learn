# Full LunarLanderContinuous-v3 SAC + LTC comparison.

experiment:
  environment: LunarLanderContinuous-v3
  algorithm: SAC
  policy: MlpPolicy
  variants:
    - mlp
    - ltc
    - ltc_residual
    - ltc_residual_action

environment:
  frame_stack: 4

training:
  timesteps: 500000
  seed: 42
  device: cuda
  allow_cpu: false
  progress_bar: true

evaluation:
  episodes: 10
  frequency: 10000

output:
  directory: outputs/lunarlander
  tensorboard_log: runs/lunarlander
  run_tag: null

sac:
  learning_rate: 0.00073
  learning_rate_schedule: linear
  policy_net_arch: [400, 300]
  buffer_size: 1000000
  batch_size: 256
  ent_coef: auto
  gamma: 0.99
  tau: 0.01
  train_freq: 1
  gradient_steps: 1
  learning_starts: 10000

ltc:
  liquid_hidden_dim: 128
  features_dim: 256
  raw_features_dim: 128
  fusion_hidden_dim: 256
  dt: 1.0
  tau_min: 0.1
  ode_unfolds: 4
  reversal_init_scale: 1.0
