# Multi-environment PPO strong baseline based on the SB3 RL-Zoo 2.7 recipe.

experiment:
  environment: LunarLanderContinuous-v3
  algorithm: PPO
  policy: MlpPolicy
  variants:
    - mlp

environment:
  frame_stack: 1
  # The RL-Zoo recipe uses 16 environments to maximize rollout diversity.
  n_envs: 16

training:
  # Exactly 64 complete rollouts: 64 * 16 envs * 1024 steps.
  timesteps: 1048576
  seed: 42
  # SB3 recommends CPU for PPO with an MLP policy.
  device: cpu
  allow_cpu: true
  progress_bar: true

evaluation:
  episodes: 10
  frequency: 32768

output:
  directory: outputs/lunarlander_ppo_parallel
  tensorboard_log: runs/lunarlander_ppo_parallel
  run_tag: null

ppo:
  learning_rate: 0.0003
  learning_rate_schedule: constant
  policy_net_arch: [64, 64]
  n_steps: 1024
  batch_size: 64
  n_epochs: 4
  gamma: 0.999
  gae_lambda: 0.98
  clip_range: 0.2
  clip_range_vf: null
  normalize_advantage: true
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  use_sde: false
  sde_sample_freq: -1
  target_kl: null

