# Short CPU plumbing check. Rewards from this run are not research results.

experiment:
  environment: LunarLanderContinuous-v3
  algorithm: SAC
  policy: MlpPolicy
  variants:
    - ltc_residual
    - ltc_residual_action

environment:
  frame_stack: 4
  n_envs: 1

training:
  timesteps: 2000
  seed: 42
  device: auto
  allow_cpu: true
  progress_bar: true

evaluation:
  episodes: 2
  frequency: 1000

output:
  directory: outputs/lunarlander_smoke
  tensorboard_log: runs/lunarlander_smoke
  run_tag: null

sac:
  learning_rate: 0.00073
  learning_rate_schedule: linear
  policy_net_arch: [400, 300]
  buffer_size: 1000000
  batch_size: 256
  ent_coef: auto
  gamma: 0.99
  tau: 0.01
  train_freq: 1
  gradient_steps: 1
  learning_starts: 10000

ltc:
  liquid_hidden_dim: 128
  features_dim: 256
  raw_features_dim: 128
  fusion_hidden_dim: 256
  dt: 1.0
  tau_min: 0.1
  ode_unfolds: 4
  reversal_init_scale: 1.0
